$kind: http-request
name: Sync Conversation Snapshots
method: PATCH
url: '{{baseUrl}}/api/v1/conversations/{{testConversationId}}/sync-snapshots'
order: 4000
headers:
  - key: Authorization
    value: 'Bearer {{authToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
        pm.response.to.have.status(200);
      });
      pm.test("Response indicates sync success", function () {
        const json = pm.response.json();
        pm.expect(json).to.satisfy(function (r) {
          return r.hasOwnProperty("conversationId") || r.hasOwnProperty("message") || r.hasOwnProperty("success");
        });
      });
