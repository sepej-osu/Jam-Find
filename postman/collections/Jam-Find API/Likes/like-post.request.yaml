$kind: http-request
name: Like Post
method: POST
url: '{{baseUrl}}/api/v1/posts/{{testPostId}}/like'
order: 1000
headers:
  - key: Authorization
    value: 'Bearer {{authToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200 or 201", function () {
        pm.expect(pm.response.code).to.be.oneOf([200, 201]);
      });
      pm.test("Response indicates like toggled", function () {
        const json = pm.response.json();
        pm.expect(json).to.satisfy(function (r) {
          return r.hasOwnProperty("liked") || r.hasOwnProperty("message") || r.hasOwnProperty("likeCount");
        });
      });
