$kind: http-request
name: Update Profile
method: PATCH
url: '{{baseUrl}}/api/v1/profiles/{{devUserId}}'
order: 3000
headers:
  - key: Authorization
    value: 'Bearer {{authToken}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "bio": "Updated bio — guitarist and vocalist looking for weekly jams.",
      "genres": ["blues", "jazz", "rock"]
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
        pm.response.to.have.status(200);
      });
      pm.test("Response has userId", function () {
        const json = pm.response.json();
        pm.expect(json).to.have.property("userId");
      });
