$kind: http-request
name: Delete Profile
method: DELETE
url: '{{baseUrl}}/api/v1/profiles/{{devUserId}}'
order: 4000
headers:
  - key: Authorization
    value: 'Bearer {{authToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200 or 204", function () {
        pm.expect(pm.response.code).to.be.oneOf([200, 204]);
      });
