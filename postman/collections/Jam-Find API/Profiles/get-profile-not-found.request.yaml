$kind: http-request
name: Get Profile - Not Found
method: GET
url: '{{baseUrl}}/api/v1/profiles/nonexistent-user-id-12345'
headers:
  - key: Authorization
    value: 'Bearer {{authToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Returns 404 for non-existent profile", function () {
        pm.response.to.have.status(404);
      });
      pm.test("Error response has detail field", function () {
        const json = pm.response.json();
        pm.expect(json).to.have.property("detail");
      });
order: 2124
