$kind: http-request
name: Get Profile
method: GET
url: '{{baseUrl}}/api/v1/profiles/{{devUserId}}'
order: 2000
headers:
  - key: Authorization
    value: 'Bearer {{authToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
        pm.response.to.have.status(200);
      });
      pm.test("Response has userId", function () {
        const json = pm.response.json();
        pm.expect(json).to.have.property("userId");
      });
      pm.test("Response has firstName", function () {
        const json = pm.response.json();
        pm.expect(json).to.have.property("firstName");
      });
