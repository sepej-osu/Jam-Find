$kind: http-request
name: Create Profile - Duplicate (409)
method: POST
url: '{{baseUrl}}/api/v1/profiles'
headers:
  - key: Authorization
    value: 'Bearer {{authToken}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "userId": "{{devUserId}}",
      "email": "testuser@example.com",
      "firstName": "Test",
      "lastName": "User",
      "bio": "I love jamming on guitar",
      "experienceYears": 3,
      "instruments": [{"name": "electric_guitar", "skillLevel": 4}],
      "genres": ["rock", "blues"]
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Returns 409 for duplicate profile", function () {
        pm.response.to.have.status(409);
      });
      pm.test("Error message mentions conflict", function () {
        const json = pm.response.json();
        pm.expect(json).to.have.property("detail");
      });
order: 1291
