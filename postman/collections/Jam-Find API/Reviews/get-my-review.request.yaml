$kind: http-request
name: Get My Review
method: GET
url: '{{baseUrl}}/api/v1/profiles/{{testUserId}}/reviews/my'
order: 3000
headers:
  - key: Authorization
    value: 'Bearer {{authToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200 or 404", function () {
        pm.expect(pm.response.code).to.be.oneOf([200, 404]);
      });
      if (pm.response.code === 200) {
        pm.test("Response has review data", function () {
          const json = pm.response.json();
          pm.expect(json).to.satisfy(function (r) {
            return r.hasOwnProperty("reviewId") || r.hasOwnProperty("rating") || r.hasOwnProperty("id");
          });
        });
      }
