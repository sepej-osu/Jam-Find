$kind: http-request
name: Review Yourself - Forbidden (403)
method: POST
url: '{{baseUrl}}/api/v1/profiles/{{devUserId}}/reviews'
headers:
  - key: Authorization
    value: 'Bearer {{authToken}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "rating": 5,
      "text": "I am the best musician!"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Returns 403 when reviewing yourself", function () {
        pm.response.to.have.status(403);
      });
      pm.test("Error message mentions self-review restriction", function () {
        const json = pm.response.json();
        pm.expect(json).to.have.property("detail");
      });
