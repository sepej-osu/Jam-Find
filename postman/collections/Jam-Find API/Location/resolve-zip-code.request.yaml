$kind: http-request
name: Resolve Zip Code
method: GET
url: '{{baseUrl}}/api/v1/location/resolve/{{zipCode}}'
order: 1000
headers:
  - key: Authorization
    value: 'Bearer {{authToken}}'
pathVariables:
  - key: zipCode
    value: '90210'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
        pm.response.to.have.status(200);
      });
      pm.test("Response has location data", function () {
        const json = pm.response.json();
        pm.expect(json).to.satisfy(function (r) {
          return r.hasOwnProperty("lat") || r.hasOwnProperty("latitude") || r.hasOwnProperty("city") || r.hasOwnProperty("zipCode");
        });
      });
