$kind: http-request
name: Resolve Invalid Zip Code (404)
method: GET
url: '{{baseUrl}}/api/v1/location/resolve/00000'
headers:
  - key: Authorization
    value: 'Bearer {{authToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Returns 404 for invalid zip code", function () {
        pm.response.to.have.status(404);
      });
      pm.test("Error response has detail field", function () {
        const json = pm.response.json();
        pm.expect(json).to.have.property("detail");
      });
