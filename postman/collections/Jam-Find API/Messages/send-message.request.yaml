$kind: http-request
name: Send Message
method: POST
url: '{{baseUrl}}/api/v1/conversations/{{testConversationId}}/messages'
order: 1000
headers:
  - key: Authorization
    value: 'Bearer {{authToken}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "text": "Hey, I saw your post and I'm interested in jamming!"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200 or 201", function () {
        pm.expect(pm.response.code).to.be.oneOf([200, 201]);
      });
      pm.test("Response has messageId or message data", function () {
        const json = pm.response.json();
        pm.expect(json).to.satisfy(function (r) {
          return r.hasOwnProperty("messageId") || r.hasOwnProperty("id") || r.hasOwnProperty("text");
        });
      });
