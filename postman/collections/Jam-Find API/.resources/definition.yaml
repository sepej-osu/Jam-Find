$kind: collection
name: Jam-Find API
description: |-
  Complete API collection for the Jam-Find application — a platform for musicians to find jam partners.

  ## Authentication
  All requests (except Health) require a Firebase ID token passed as a Bearer token in the `Authorization` header.
  Set the `authToken` environment variable in the **Jam-Find Local** environment before running requests.


  ## Environment Variables
  | Variable | Description |
  |---|---|
  | `baseUrl` | API base URL (e.g. `http://localhost:8000`) |
  | `authToken` | Firebase ID token (Bearer) |
  | `devUserId` | Your Firebase UID for development testing |
  | `testUserId` | Another user's UID for cross-user tests |
  | `testPostId` | Captured automatically after Create Post |
  | `testConversationId` | Captured automatically after Create Conversation |
  | `testReviewId` | Captured automatically after Create Review |

  ## Folder Structure
  - **Health** — API health check
  - **Profiles** — User profile CRUD
  - **Posts** — Jam session / musician post CRUD + listing
  - **Likes** — Toggle like on a post
  - **Conversations** — Messaging thread management
  - **Messages** — Send and retrieve messages within a conversation
  - **Reviews** — Leave and manage reviews on user profiles
  - **Location** — Resolve a US zip code to lat/lng coordinates
variables:
  - key: baseUrl
    value: 'http://localhost:8000'
  - key: authToken
    value: ''
  - key: devUserId
    value: 'dev_test_user_123'
  - key: testUserId
    value: 'dev_test_user_456'
  - key: testPostId
    value: ''
  - key: testConversationId
    value: ''
  - key: testReviewId
    value: ''
  - key: zipCode
    value: '90210'
  - key: _devProfilesSeeded
      value: ''
      
scripts:
  - type: preRequest
    language: text/javascript
    code: |-
      const baseUrl   = pm.environment.get('baseUrl')   || pm.collectionVariables.get('baseUrl')   || 'http://localhost:8000';
      const authToken = pm.environment.get('authToken') || pm.collectionVariables.get('authToken') || '';
      const devUserId  = pm.environment.get('devUserId')  || pm.collectionVariables.get('devUserId')  || 'dev_test_user_123';
      const testUserId = pm.environment.get('testUserId') || pm.collectionVariables.get('testUserId') || 'dev_test_user_456';

      if (pm.collectionVariables.get('_devProfilesSeeded') === 'true') return;

      function seedProfile(userId, email, firstName, lastName, done) {
          pm.sendRequest({
              url: baseUrl + '/api/v1/profiles/' + userId,
              method: 'GET',
              header: [
                  { key: 'Authorization', value: 'Bearer ' + authToken },
                  { key: 'X-Dev-User-ID', value: userId }
              ]
          }, function (err, res) {
              if (res && res.code === 200) { done(); return; }
              pm.sendRequest({
                  url: baseUrl + '/api/v1/profiles',
                  method: 'POST',
                  header: [
                      { key: 'Content-Type', value: 'application/json' },
                      { key: 'Authorization', value: 'Bearer ' + authToken },
                      { key: 'X-Dev-User-ID', value: userId }
                  ],
                  body: {
                      mode: 'raw',
                      raw: JSON.stringify({
                          userId: userId,
                          email: email,
                          firstName: firstName,
                          lastName: lastName,
                          bio: 'Dev test user — auto-seeded',
                          instruments: [{ name: 'electric_guitar', skillLevel: 3 }],
                          genres: ['rock'],
                          location: {
                              zipCode: null,
                              formattedAddress: 'Beverly Hills, CA 90210, USA',
                              lat: 34.0901,
                              lng: -118.4065,
                              placeId: 'ChIJWRSBHBjEwoARvBFJAMmVAAQ',
                              geohash: '9q5cc'
                          }
                      })
                  }
              }, function (err2, res2) { done(); });
          });
      }

      seedProfile(devUserId,  'devuser@example.com',  'Dev',  'User',      function () {
          seedProfile(testUserId, 'testuser@example.com', 'Test', 'Recipient', function () {
              pm.collectionVariables.set('_devProfilesSeeded', 'true');
          });
      });


