$kind: http-request
name: List Posts - Filter by Type
method: GET
url: '{{baseUrl}}/api/v1/posts?postType=looking_for_musicians&limit=5'
headers:
  - key: Authorization
    value: 'Bearer {{authToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
        pm.response.to.have.status(200);
      });
      pm.test("Response has posts array", function () {
        const json = pm.response.json();
        pm.expect(json).to.have.property("posts");
        pm.expect(json.posts).to.be.an("array");
      });
      pm.test("All returned posts match the filter type", function () {
        const json = pm.response.json();
        json.posts.forEach(function(post) {
          pm.expect(post.postType).to.equal("looking_for_musicians");
        });
      });
order: 3851
