$kind: http-request
name: Update Post
method: PATCH
url: '{{baseUrl}}/api/v1/posts/{{testPostId}}'
order: 3000
headers:
  - key: Authorization
    value: 'Bearer {{authToken}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "title": "Updated — Looking for blues guitarist and bassist",
      "body": "Updated description. Now also looking for a bassist.",
      "instruments": [
        { "name": "electric_guitar", "skillLevel": 3 },
        { "name": "electric_bass", "skillLevel": 2 },
        { "name": "drums", "skillLevel": 2 }
      ]
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
        pm.response.to.have.status(200);
      });
      pm.test("Response has postId", function () {
        const json = pm.response.json();
        pm.expect(json).to.have.property("postId");
      });