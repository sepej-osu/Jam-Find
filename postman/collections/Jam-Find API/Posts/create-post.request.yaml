$kind: http-request
name: Create Post
method: POST
url: '{{baseUrl}}/api/v1/posts'
order: 1000
headers:
  - key: Authorization
    value: 'Bearer {{authToken}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "title": "Looking for a blues guitarist in LA",
      "body": "Weekly jam sessions on weekends. All skill levels welcome.",
      "postType": "looking_to_jam",
      "instruments": [
        { "name": "electric_guitar", "skillLevel": 3 },
        { "name": "drums", "skillLevel": 2 }
      ],
      "genres": ["blues", "rock"],
      "location": { "zipCode": "90210" }
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200 or 201", function () {
        pm.expect(pm.response.code).to.be.oneOf([200, 201]);
      });
      pm.test("Response has postId and captures it", function () {
        const json = pm.response.json();
        pm.expect(json).to.have.property("postId");
        pm.environment.set("testPostId", json.postId);
        console.log("Captured testPostId:", json.postId);
      });
