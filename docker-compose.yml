services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      # Mount your serviceAccountKey.json into the container (read-only).
      # The file must exist at this path on the host before running docker compose up.
      - ./serviceAccountKey.json:/app/credentials/serviceAccountKey.json:ro
    env_file:
      - .env
    environment:
      # Override the credentials path to match the mounted volume location
      - FIREBASE_CREDENTIALS_PATH=/app/credentials/serviceAccountKey.json
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        # Vite env vars are baked into the JS bundle at build time.
        # All values are read from your .env file automatically.
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID}
        VITE_FIREBASE_MEASUREMENT_ID: ${VITE_FIREBASE_MEASUREMENT_ID}
        VITE_API_URL: ${VITE_API_URL}
    ports:
      - "127.0.0.1:80:80"
    depends_on:
      - backend
    restart: unless-stopped
